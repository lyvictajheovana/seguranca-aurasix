<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSafe Control</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b16;
color:white;
}

/* TOPO */
header{
background:#15152b;
padding:15px;
text-align:center;
font-size:22px;
border-bottom:2px solid #7b2cff;
}

/* LAYOUT */
.container{
display:flex;
flex-wrap:wrap;
}

/* MAPA ARQUITETÔNICO */
.map{
flex:2;
height:600px;
margin:15px;
border-radius:10px;
background:#111122;
position:relative;
overflow:hidden;
}

/* LINHAS ARQUITETÔNICAS */
.area{
position:absolute;
border:2px solid rgba(255,255,255,0.2);
color:#aaa;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

/* ÁREAS DO EVENTO */
.entrada{top:5%;left:5%;width:25%;height:20%;}
.pista{top:30%;left:10%;width:60%;height:50%;}
.vip{top:10%;left:70%;width:25%;height:25%;}
.backstage{top:70%;left:75%;width:20%;height:20%;}

/* SIDEBAR */
.sidebar{
flex:1;
background:#15152b;
margin:15px;
border-radius:10px;
padding:15px;
}

/* PESSOAS */
.person{
width:10px;
height:10px;
border-radius:50%;
position:absolute;
cursor:pointer;
}

.green{background:#00ff88;}
.yellow{background:#ffd000;}
.red{background:#ff3b3b;}

button{
width:100%;
padding:12px;
border:none;
background:#7b2cff;
color:white;
border-radius:8px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

.alert{
position:fixed;
top:20px;
right:20px;
background:#ff2e2e;
padding:15px 25px;
border-radius:10px;
display:none;
font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{opacity:0.5;}
}

.info{
margin-top:15px;
background:#1c1c34;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
🛡️ AuraSafe Control | Monitoramento de Evento - AuraSix
</header>

<div class="container">

<!-- MAPA -->
<div class="map" id="mapa">

<!-- ÁREAS -->
<div class="area entrada">ENTRADA</div>
<div class="area pista">PISTA PRINCIPAL</div>
<div class="area vip">ÁREA VIP</div>
<div class="area backstage">BACKSTAGE</div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Status do Evento</h3>
<p>Participantes: <b id="total">0</b></p>
<p>Alertas ativos: <b id="alertas">0</b></p>

<button onclick="intervencao()">⚠ Alerta de Intervenção</button>

<div class="info" id="info">
Clique em uma pessoa no mapa.
</div>

</div>

</div>

<div class="alert" id="alerta">
🚨 INTERVENÇÃO NECESSÁRIA
</div>

<script>

/* CRIAR MUITAS PESSOAS AUTOMATICAMENTE */

const mapa = document.getElementById("mapa");
let totalPessoas = 280; // quantidade do evento

for(let i=0;i<totalPessoas;i++){

let p = document.createElement("div");
p.classList.add("person","green");

p.style.top = Math.random()*95 + "%";
p.style.left = Math.random()*95 + "%";

p.onclick = function(){
document.getElementById("info").innerHTML =
"<b>Participante "+(i+1)+"</b><br>Status: Normal<br>Local monitorado";
}

mapa.appendChild(p);
}

document.getElementById("total").innerText = totalPessoas;


/* ALERTA DE INTERVENÇÃO */

function intervencao(){

let pessoas = document.querySelectorAll(".person");
let alvo = pessoas[Math.floor(Math.random()*pessoas.length)];

alvo.classList.remove("green");
alvo.classList.add("red");

document.getElementById("alertas").innerText="1";

let alerta=document.getElementById("alerta");
alerta.style.display="block";

setTimeout(()=>{
alerta.style.display="none";
},4000);

}

</script>

</body>
</html>

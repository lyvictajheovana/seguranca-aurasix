<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSafe Control</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b16;
color:white;
overflow:hidden;
}

header{
background:#15152b;
padding:15px;
text-align:center;
font-size:22px;
border-bottom:2px solid #7b2cff;
}

.container{
display:flex;
}

/* MAPA */
.map{
flex:2;
height:650px;
margin:15px;
border-radius:10px;
background:#111122;
position:relative;
overflow:hidden;
}

/* ÁREAS */
.area{
position:absolute;
border:2px solid rgba(255,255,255,0.2);
color:#aaa;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.entrada{top:5%;left:5%;width:25%;height:20%;}
.pista{top:30%;left:10%;width:60%;height:50%;}
.vip{top:10%;left:70%;width:25%;height:25%;}
.backstage{top:70%;left:75%;width:20%;height:20%;}

/* SIDEBAR */
.sidebar{
flex:1;
background:#15152b;
margin:15px;
border-radius:10px;
padding:15px;
}

.person{
width:8px;
height:8px;
border-radius:50%;
position:absolute;
transition:all 2s linear;
cursor:pointer;
}

.green{background:#00ff88;}
.yellow{background:#ffd000;}
.red{background:#ff3b3b;}

.alert{
position:fixed;
top:20px;
right:20px;
background:#ff2e2e;
padding:15px 25px;
border-radius:10px;
display:none;
font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{opacity:0.5;}
}

button{
width:100%;
padding:12px;
border:none;
background:#7b2cff;
color:white;
border-radius:8px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

.info{
margin-top:15px;
background:#1c1c34;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
🛡️ AuraSafe Control | Monitoramento Inteligente AuraSix
</header>

<div class="container">

<div class="map" id="mapa">

<div class="area entrada">ENTRADA</div>
<div class="area pista">PISTA PRINCIPAL</div>
<div class="area vip">ÁREA VIP</div>
<div class="area backstage">BACKSTAGE</div>

</div>

<div class="sidebar">

<h3>Status do Evento</h3>
<p>Participantes: <b id="total"></b></p>
<p>Alertas ativos: <b id="alertas">6</b></p>

<button onclick="intervencao()">⚠ Alerta de Intervenção</button>

<div class="info" id="info">
Sistema ativo. Monitoramento em tempo real.
</div>

</div>

</div>

<div class="alert" id="alerta">
🚨 EQUIPE DE SEGURANÇA ACIONADA
</div>

<script>

const mapa = document.getElementById("mapa");
const totalPessoas = 280;
document.getElementById("total").innerText = totalPessoas;

let pessoas=[];

/* DISTRIBUIÇÃO REALISTA */
function gerarStatus(){
let r=Math.random();

if(r<0.85) return "green";     // maioria normal
if(r<0.96) return "yellow";    // atenção
return "red";                  // poucos riscos
}

/* CRIAR PARTICIPANTES */
for(let i=0;i<totalPessoas;i++){

let p=document.createElement("div");
let status=gerarStatus();

p.classList.add("person",status);

p.style.top=Math.random()*95+"%";
p.style.left=Math.random()*95+"%";

p.dataset.id=i+1;

p.onclick=function(){
document.getElementById("info").innerHTML=
"<b>Participante "+p.dataset.id+
"</b><br>Status: "+status.toUpperCase()+
"<br>Monitorado por pulseira AuraBand";
}

mapa.appendChild(p);
pessoas.push(p);
}

/* MOVIMENTO AUTOMÁTICO */
function moverPessoas(){

pessoas.forEach(p=>{
let novaTop=Math.random()*95;
let novaLeft=Math.random()*95;

p.style.top=novaTop+"%";
p.style.left=novaLeft+"%";
});

}

setInterval(moverPessoas,4000);

/* ALERTA DE INTERVENÇÃO */
function intervencao(){

let alvo=pessoas[Math.floor(Math.random()*pessoas.length)];

alvo.classList.remove("green","yellow");
alvo.classList.add("red");

document.getElementById("alertas").innerText++;

let alerta=document.getElementById("alerta");
alerta.style.display="block";

setTimeout(()=>{
alerta.style.display="none";
},4000);

}

</script>

</body>
</html>
